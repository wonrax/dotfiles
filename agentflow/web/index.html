<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>agentflow // mission control</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0b0f0d;
    --bg-raise: #101613;
    --bg-panel: #0e1411;
    --line: #1d2a23;
    --line-bright: #2c4436;
    --text: #c8d6cd;
    --text-dim: #5f7268;
    --text-faint: #3a4a41;
    --ok: #4ade80;
    --ok-dim: #14532d;
    --run: #fbbf24;
    --run-dim: #4a3505;
    --fail: #f87171;
    --fail-dim: #501b1b;
    --stop: #64748b;
    --start: #38bdf8;
    --accent: #4ade80;
    font-size: 14px;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f6f3;
      --bg-raise: #ffffff;
      --bg-panel: #eef1ec;
      --line: #d8ded7;
      --line-bright: #b9c4b8;
      --text: #2b352e;
      --text-dim: #64716a;
      --text-faint: #97a29a;
      --ok: #15803d;
      --ok-dim: #bbe7c8;
      --run: #b45309;
      --run-dim: #fde9c8;
      --fail: #b91c1c;
      --fail-dim: #fbd5d5;
      --stop: #64748b;
      --start: #0369a1;
      --accent: #15803d;
    }
    .logs { background: #e9ede7 !important; }
    .logs pre { color: #3d4a42 !important; }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  .app {
    display: grid;
    grid-template-columns: var(--sidebar-w, 300px) 4px 1fr;
    grid-template-rows: 48px 1fr 28px;
    height: 100vh;
  }
  .vsplit { cursor: col-resize; background: var(--line); transition: background .15s; }
  .vsplit:hover, .hsplit:hover { background: var(--accent); }
  .hsplit { cursor: row-resize; background: var(--line); transition: background .15s; }

  header {
    grid-column: 1 / -1; display: flex; align-items: center; gap: 16px;
    border-bottom: 1px solid var(--line); padding: 0 16px; background: var(--bg-panel);
  }
  .wordmark { font-family: "Instrument Serif", serif; font-size: 22px; font-style: italic; color: var(--accent); letter-spacing: .5px; }
  .wordmark::after { content: "_"; animation: blink 1.1s steps(1) infinite; font-style: normal; }
  @keyframes blink { 50% { opacity: 0 } }
  .crumb { color: var(--text-faint); font-size: 11px; text-transform: uppercase; letter-spacing: 2px; }
  header .right { margin-left: auto; display: flex; gap: 14px; align-items: center; font-size: 11px; color: var(--text-dim); }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 5px; }
  .dot.live { background: var(--ok); box-shadow: 0 0 8px var(--ok); animation: pulse 2s infinite; }
  .dot.dead { background: var(--fail); }
  @keyframes pulse { 50% { opacity: .4 } }

  aside {
    border-right: 1px solid var(--line); background: var(--bg-panel); overflow-y: auto;
  }
  .side-head { padding: 12px 14px 6px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-faint); display:flex; justify-content: space-between; }
  .task-item {
    padding: 10px 14px; border-bottom: 1px solid var(--line); cursor: pointer;
    display: flex; flex-direction: column; gap: 4px; transition: background .12s;
  }
  .task-item:hover { background: var(--bg-raise); }
  .task-item.sel { background: var(--bg-raise); box-shadow: inset 3px 0 0 var(--accent); }
  .task-item .row1 { display: flex; align-items: center; gap: 8px; }
  .task-item .tid { font-size: 11px; color: var(--text-dim); }
  .task-item .prompt { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-item .repo { font-size: 10px; color: var(--text-faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pill {
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; padding: 2px 7px;
    border: 1px solid; border-radius: 2px; margin-left: auto;
  }
  .pill.running   { color: var(--run);   border-color: var(--run-dim);  background: color-mix(in srgb, var(--run) 8%, transparent); animation: pulse 1.6s infinite; }
  .pill.starting  { color: var(--start); border-color: var(--start); opacity:.8; }
  .pill.succeeded { color: var(--ok);    border-color: var(--ok-dim);   background: color-mix(in srgb, var(--ok) 8%, transparent); }
  .pill.failed    { color: var(--fail);  border-color: var(--fail-dim); background: color-mix(in srgb, var(--fail) 8%, transparent); }
  .pill.stopped   { color: var(--stop);  border-color: var(--stop); opacity:.7; }

  main { display: grid; grid-template-rows: auto 1fr 4px var(--logs-h, 240px); overflow: hidden; }
  .task-head { padding: 14px 20px 10px; border-bottom: 1px solid var(--line); display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  .task-head h1 {
    font-size: 15px; font-weight: 500; max-width: 60ch;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .fullprompt { font-size: 11px; color: var(--text-dim); }
  .fullprompt summary { cursor: pointer; letter-spacing: 1px; text-transform: uppercase; font-size: 9px; color: var(--text-faint); }
  .fullprompt pre { white-space: pre-wrap; max-height: 180px; overflow-y: auto; margin-top: 6px; max-width: 80ch; }
  .task-head .meta { font-size: 11px; color: var(--text-dim); }
  .task-head .error { width: 100%; color: var(--fail); font-size: 11px; white-space: pre-wrap; }
  .task-head .acts { margin-left: auto; display: flex; gap: 6px; align-items: center; }
  .act {
    background: none; border: 1px solid var(--line-bright); color: var(--text-dim); border-radius: 2px;
    font: inherit; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; padding: 3px 9px; cursor: pointer;
  }
  .act:hover { color: var(--accent); border-color: var(--accent); }
  .act.danger:hover { color: var(--fail); border-color: var(--fail); }

  .graph-wrap { position: relative; overflow: hidden; touch-action: none; cursor: grab; background:
    radial-gradient(ellipse 60% 50% at 50% 0%, color-mix(in srgb, var(--accent) 4%, transparent), transparent),
    repeating-linear-gradient(90deg, transparent 0 39px, color-mix(in srgb, var(--line) 45%, transparent) 39px 40px),
    repeating-linear-gradient(0deg, transparent 0 39px, color-mix(in srgb, var(--line) 45%, transparent) 39px 40px);
  }
  svg.graph { display: block; width: 100%; height: 100%; }
  .graph-wrap.panning { cursor: grabbing; }

  .node rect {
    fill: var(--bg-raise); stroke: var(--line-bright); stroke-width: 1.2; rx: 3;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,.5));
    transition: stroke .15s, opacity .3s;
  }
  .node { cursor: pointer; }
  .node:hover rect { stroke: var(--text-dim); }
  .node.sel rect { stroke-width: 2; }
  .node text.nname { fill: var(--text); font: 500 13px "IBM Plex Mono", monospace; }
  .node text.ntype { fill: var(--text-faint); font: 400 9px "IBM Plex Mono", monospace; letter-spacing: 2px; text-transform: uppercase; }
  .node text.nvisit { fill: var(--text-dim); font: 400 10px "IBM Plex Mono", monospace; }
  .node text.nstate { font: 600 8px "IBM Plex Mono", monospace; letter-spacing: 1.5px; }
  .node .lamp { r: 5; }

  /* node lifecycle states */
  .node.st-awaiting rect { stroke-dasharray: 4 4; opacity: .5; }
  .node.st-awaiting text { opacity: .55; }
  .node.st-awaiting .lamp { fill: var(--text-faint); }
  .node.st-running rect {
    stroke: var(--run); stroke-width: 1.8; stroke-dasharray: 8 5;
    animation: ants 1s linear infinite;
    filter: drop-shadow(0 0 10px color-mix(in srgb, var(--run) 55%, transparent));
  }
  .node.st-running .lamp { fill: var(--run); filter: drop-shadow(0 0 6px var(--run)); animation: pulse 1.2s infinite; }
  .node.st-running text.nstate { fill: var(--run); }
  @keyframes ants { to { stroke-dashoffset: -26; } }
  .node.st-ok rect, .node.st-approve rect { stroke: color-mix(in srgb, var(--ok) 55%, var(--line-bright)); }
  .node.st-ok .lamp, .node.st-approve .lamp { fill: var(--ok); filter: drop-shadow(0 0 5px var(--ok)); }
  .node.st-ok text.nstate, .node.st-approve text.nstate { fill: var(--ok); }
  .node.st-fail rect, .node.st-request_changes rect { stroke: color-mix(in srgb, var(--fail) 55%, var(--line-bright)); }
  .node.st-fail .lamp, .node.st-request_changes .lamp { fill: var(--fail); filter: drop-shadow(0 0 5px var(--fail)); }
  .node.st-fail text.nstate, .node.st-request_changes text.nstate { fill: var(--fail); }

  .edge { stroke: var(--line-bright); stroke-width: 1.4; fill: none; marker-end: url(#arr); transition: stroke .3s; }
  .edge.back { stroke-dasharray: 5 4; stroke: var(--run-dim); }
  .edge.active {
    stroke: var(--run); stroke-width: 1.8; stroke-dasharray: 7 5;
    animation: ants 0.8s linear infinite;
    filter: drop-shadow(0 0 4px var(--run));
  }
  .edge-label { fill: var(--text-faint); font: 400 9px "IBM Plex Mono", monospace; letter-spacing: 1px; text-transform: uppercase; }
  .edge-label.changes { fill: color-mix(in srgb, var(--run) 70%, var(--text-faint)); }

  .logs { border-top: 1px solid var(--line); display: grid; grid-template-rows: 32px 1fr 40px; background: #070b09; }
  .feedback { display: flex; gap: 8px; padding: 6px 12px; border-top: 1px solid var(--line); }
  .feedback input {
    flex: 1; background: var(--bg-raise); color: var(--text); border: 1px solid var(--line);
    border-radius: 2px; padding: 4px 10px; font: inherit; font-size: 12px;
  }
  .feedback input:focus { outline: none; border-color: var(--accent); }
  .feedback button {
    background: none; border: 1px solid var(--line-bright); color: var(--text-dim); border-radius: 2px;
    font: inherit; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; padding: 0 14px; cursor: pointer;
  }
  .feedback button:hover { color: var(--accent); border-color: var(--accent); }
  #fbint:hover { color: var(--run); border-color: var(--run); }
  .logs .bar { display: flex; align-items: center; gap: 12px; padding: 0 16px; border-bottom: 1px solid var(--line); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-faint); }
  .logs .bar .which { color: var(--run); }
  .logs pre {
    overflow: auto; padding: 10px 16px; font-size: 11.5px; line-height: 1.55;
    color: #9fb4a7; white-space: pre-wrap; word-break: break-word;
  }
  .logs pre .sysline { color: var(--text-faint); font-style: italic; }
  .logs pre .tooluse { color: var(--run); }
  .logs pre .prompt { color: var(--text); opacity: .85; border-left: 2px solid var(--line-bright); display: inline-block; padding-left: 8px; }
  .logs pre .toolres { color: var(--text-faint); }
  .modes { display: flex; gap: 4px; margin-left: 14px; }
  .mode {
    background: none; border: 1px solid var(--line); color: var(--text-faint); border-radius: 2px;
    font: inherit; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; padding: 2px 8px; cursor: pointer;
  }
  .mode.on { color: var(--accent); border-color: var(--accent); }

  .statusbar {
    grid-column: 1 / -1; border-top: 1px solid var(--line); background: var(--bg-panel);
    display: flex; align-items: center; gap: 20px; padding: 0 14px; font-size: 10px; color: var(--text-faint); letter-spacing: 1px;
  }
  .statusbar .k { color: var(--text-dim); }
  .empty {
    display: grid; place-items: center; height: 100%; color: var(--text-faint);
    font-family: "Instrument Serif", serif; font-style: italic; font-size: 18px;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <span class="wordmark">agentflow</span>
    <span class="crumb">workflow orchestrator</span>
    <div class="right">
      <span id="conn"><span class="dot dead"></span>connecting</span>
      <span id="clock"></span>
    </div>
  </header>

  <aside>
    <div class="side-head"><span>tasks</span><span id="count"></span></div>
    <div id="tasklist"></div>
  </aside>

  <div class="vsplit" id="vsplit"></div>

  <main>
    <div class="task-head" id="taskhead"><h1 class="empty" style="height:auto">no task selected</h1></div>
    <div class="graph-wrap" id="graphwrap"><div class="empty" id="graphempty">spawn a task to see its graph…</div><svg class="graph" id="graph" style="display:none"></svg></div>
    <div class="hsplit" id="hsplit"></div>
    <div class="logs">
      <div class="bar">
        <span>node output</span><span class="which" id="lognode">—</span>
        <span class="modes"><button id="msum" class="mode on">summary</button><button id="mfull" class="mode">full</button><button id="mcfg" class="mode">config</button></span>
        <span style="margin-left:auto" id="logmeta"></span>
      </div>
      <pre id="logpane"><span class="sysline">select a node to inspect its output</span></pre>
      <div class="feedback">
        <input id="fbinput" type="text" placeholder="interject: steer the agent (applied at next step)…" />
        <button id="fbsend">send</button>
        <button id="fbint" title="kill the current node and re-run it with this feedback">interrupt</button>
      </div>
    </div>
  </main>

  <div class="statusbar">
    <span><span class="k">endpoint</span> <span id="ep"></span></span>
    <span><span class="k">board</span> main</span>
    <span style="margin-left:auto">jj workspaces × docker × rivet actors</span>
  </div>
</div>

<script type="module">
document.getElementById("ep").textContent = location.origin;
setInterval(() => document.getElementById("clock").textContent = new Date().toLocaleTimeString("en-GB"), 1000);

let tasks = [];               // TaskSummary[]
let selId = null;             // selected task id
let cur = null;               // selected TaskRecord
let curEs = null;             // EventSource for selected task
let selNode = null;           // selected node id
const nodeLogs = new Map();   // node id -> string

const $ = (id) => document.getElementById(id);
const esc = (s) => s.replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));

function setConn(ok) {
  $("conn").innerHTML = ok
    ? '<span class="dot live"></span>live'
    : '<span class="dot dead"></span>offline';
}

// ---------------- sidebar ----------------
function renderList() {
  $("count").textContent = tasks.length || "";
  $("tasklist").innerHTML = tasks.map((t) => `
    <div class="task-item ${t.id === selId ? "sel" : ""}" data-id="${t.id}">
      <div class="row1"><span class="tid">${t.id}</span><span class="pill ${t.status}">${t.status}</span></div>
      <div class="prompt">${esc(t.title ?? t.task)}</div>
      ${t.repo ? `<div class="repo">${esc(t.repo)}</div>` : ""}
    </div>`).join("");
  for (const el of document.querySelectorAll(".task-item")) {
    el.onclick = () => select(el.dataset.id);
  }
}

// ---------------- selection ----------------
async function select(id) {
  if (curEs) { curEs.close(); curEs = null; }
  selId = id; selNode = null; nodeLogs.clear();
  renderList();
  cur = await (await fetch(`/api/task/${id}`)).json();
  renderTask();
  curEs = new EventSource(`/api/task/${id}/events`);
  curEs.addEventListener("update", (e) => { cur = JSON.parse(e.data); renderTask(); });
  curEs.addEventListener("node", (e) => {
    const run = JSON.parse(e.data);
    const i = cur.runs.findIndex((r) => r.node === run.node && r.visit === run.visit);
    if (i >= 0) cur.runs[i] = run; else cur.runs.push(run);
    // a new visit starting means the live chunk buffer belongs to the old one
    if (run.status === "running") { nodeLogs.delete(run.node); liveLlm.delete(run.node); }
    if (selNode === run.node) renderLog();
    renderGraph();
  });
  curEs.addEventListener("log", (e) => {
    const { node, chunk } = JSON.parse(e.data);
    nodeLogs.set(node, ((nodeLogs.get(node) ?? "") + chunk).slice(-65536));
    trackLiveLlm(node, chunk);
    if (selNode === node) renderLog();
  });
}

// ---------------- task pane ----------------
function renderTask() {
  if (!cur) return;
  const cost = (cur.runs ?? []).reduce((s, r) => s + (r.llm?.costUsd ?? 0), 0);
  const lastCtx = [...(cur.runs ?? [])].reverse().find((r) => r.llm?.contextPct != null)?.llm;
  const title = cur.request.title;
  $("taskhead").innerHTML = `
    <h1>${esc(title ?? cur.request.task)}</h1>
    ${title ? `<details class="fullprompt"><summary>prompt</summary><pre>${esc(cur.request.task)}</pre></details>` : ""}
    <span class="pill ${cur.status}">${cur.status}</span>
    <span class="meta">${cur.id}</span>
    <span class="meta">wf: ${cur.workflow.name}</span>
    ${cur.request.model ? `<span class="meta">${esc(cur.request.model)}</span>` : ""}
    ${cur.request.effort ? `<span class="meta">effort: ${cur.request.effort}</span>` : ""}
    ${cost ? `<span class="meta">$${cost.toFixed(4)}</span>` : ""}
    ${lastCtx ? `<span class="meta">agent ctx ${lastCtx.contextPct}%</span>` : ""}
    ${cur.request.repo ? `<span class="meta">${esc(cur.request.repo)}</span>` : ""}
    ${cur.workspace ? `<span class="meta">ws: ${cur.workspace}</span>` : ""}
    <span class="acts">
      ${cur.container ? `<button class="act" data-act="ctr" title="docker rm the container (disables revive)">clean ctr</button>` : `<span class="meta">ctr cleaned</span>`}
      ${cur.workspace || cur.cwd ? `<button class="act" data-act="ws" title="jj workspace forget + delete workspace dir">clean ws</button>` : `<span class="meta">ws cleaned</span>`}
      ${cur.container || cur.workspace || cur.cwd ? `<button class="act" data-act="both">clean both</button>` : ""}
      <button class="act danger" data-act="rm" title="full teardown + drop from board">delete</button>
    </span>
    ${cur.error ? `<div class="error">${esc(cur.error)}</div>` : ""}`;
  for (const b of document.querySelectorAll(".act")) b.onclick = () => taskAction(b.dataset.act);
  renderGraph();
}

async function taskAction(act) {
  if (!selId) return;
  if (act === "rm") {
    if (!confirm(`delete task ${selId}? removes container, workspace, and board entry`)) return;
    await fetch(`/api/task/${selId}/remove`, { method: "POST" });
    selId = null; cur = null;
    $("taskhead").innerHTML = `<h1 class="empty" style="height:auto">no task selected</h1>`;
    $("graph").style.display = "none"; $("graphempty").style.display = "grid";
    return;
  }
  const body = { container: act === "ctr" || act === "both", workspace: act === "ws" || act === "both" };
  const resp = await fetch(`/api/task/${selId}/cleanup`, {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!resp.ok) alert(await resp.text());
  else { cur = await resp.json(); renderTask(); }
}

// ---------------- graph ----------------
const NW = 170, NH = 64, GX = 90, GY = 120, PAD = 60;

function layout(wf) {
  // simple layered left-to-right layout following forward edges
  const order = [];
  const seen = new Set();
  let frontier = [wf.start ?? wf.nodes[0]?.id].filter(Boolean);
  while (frontier.length) {
    order.push(frontier.filter((n) => !seen.has(n)));
    order.at(-1).forEach((n) => seen.add(n));
    frontier = wf.edges
      .filter((e) => order.at(-1).includes(e.from) && !seen.has(e.to))
      .map((e) => e.to);
  }
  for (const n of wf.nodes) if (!seen.has(n.id)) order.push([n.id]);
  const pos = new Map();
  order.forEach((col, ci) =>
    col.forEach((id, ri) => pos.set(id, { x: PAD + ci * (NW + GX), y: PAD + ri * (NH + GY) })));
  return pos;
}

function stateFor(nodeId) {
  const runs = (cur.runs ?? []).filter((r) => r.node === nodeId);
  return runs.at(-1)?.status ?? "awaiting";
}

const STATE_LABEL = {
  awaiting: "", running: "RUNNING", ok: "OK", approve: "APPROVED",
  fail: "FAILED", request_changes: "CHANGES",
};

function renderGraph() {
  if (!cur) return;
  $("graphempty").style.display = "none";
  const svg = $("graph"); svg.style.display = "block";
  const wf = cur.workflow;
  const pos = layout(wf);

  const lastRun = (cur.runs ?? []).at(-1);
  const edges = wf.edges.map((e) => {
    const a = pos.get(e.from), b = pos.get(e.to);
    if (!a || !b) return "";
    const back = b.x <= a.x;
    const active = lastRun && lastRun.node === e.to && lastRun.status === "running";
    let d, lx, ly;
    if (!back) {
      const x1 = a.x + NW, y1 = a.y + NH / 2, x2 = b.x, y2 = b.y + NH / 2;
      const mx = (x1 + x2) / 2;
      d = `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`;
      lx = mx; ly = Math.min(y1, y2) - 8;
    } else {
      // loop-back: arc below the nodes
      const x1 = a.x + NW / 2, y1 = a.y + NH, x2 = b.x + NW / 2, y2 = b.y + NH;
      const dip = Math.max(y1, y2) + 46;
      d = `M${x1},${y1} C${x1},${dip} ${x2},${dip} ${x2},${y2}`;
      lx = (x1 + x2) / 2; ly = dip - 6;
    }
    const lbl = e.when && e.when !== "ok"
      ? `<text class="edge-label changes" x="${lx}" y="${ly}" text-anchor="middle">${e.when}</text>` : "";
    return `<path class="edge ${back ? "back" : ""} ${active ? "active" : ""}" d="${d}"/>${lbl}`;
  }).join("");

  const nodes = wf.nodes.map((n) => {
    const p = pos.get(n.id);
    const st = stateFor(n.id);
    const visits = (cur.runs ?? []).filter((r) => r.node === n.id).length;
    return `
    <g class="node st-${st} ${selNode === n.id ? "sel" : ""}" data-node="${n.id}" transform="translate(${p.x},${p.y})">
      <rect width="${NW}" height="${NH}" rx="3"/>
      <circle class="lamp" cx="18" cy="${NH / 2}" r="5"/>
      <text class="nname" x="34" y="${NH / 2 - 2}">${esc(n.label ?? n.id)}</text>
      <text class="ntype" x="34" y="${NH / 2 + 16}">${n.type}</text>
      <text class="nstate" x="${NW - 10}" y="${NH - 10}" text-anchor="end">${STATE_LABEL[st] ?? ""}</text>
      ${visits ? `<text class="nvisit" x="${NW - 10}" y="16" text-anchor="end">×${visits}</text>` : ""}
    </g>`;
  }).join("");

  svg.innerHTML = `
    <defs><marker id="arr" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" style="fill: var(--line-bright)"/></marker></defs>
    <g id="vp">${edges}${nodes}</g>`;
  applyView();
  for (const g of svg.querySelectorAll(".node")) {
    g.onclick = () => { selNode = g.dataset.node; renderGraph(); renderLog(); };
  }
}

// ---------------- canvas pan/zoom ----------------
const view = { x: 0, y: 0, k: 1 };
function applyView() {
  const vp = document.getElementById("vp");
  if (vp) vp.setAttribute("transform", `translate(${view.x} ${view.y}) scale(${view.k})`);
}
{
  const gw = $("graphwrap");
  let pan = null;
  gw.addEventListener("pointerdown", (e) => {
    // middle button pans anywhere; left button pans on empty canvas only
    if (e.button === 1 || (e.button === 0 && !e.target.closest?.(".node"))) {
      pan = { x: e.clientX, y: e.clientY };
      gw.classList.add("panning");
      gw.setPointerCapture(e.pointerId);
      e.preventDefault();
    }
  });
  gw.addEventListener("pointermove", (e) => {
    if (!pan) return;
    view.x += e.clientX - pan.x;
    view.y += e.clientY - pan.y;
    pan = { x: e.clientX, y: e.clientY };
    applyView();
  });
  const endPan = () => { pan = null; gw.classList.remove("panning"); };
  gw.addEventListener("pointerup", endPan);
  gw.addEventListener("pointercancel", endPan);
  gw.addEventListener("wheel", (e) => {
    e.preventDefault();
    if (e.ctrlKey || e.metaKey) {
      // zoom about the cursor (trackpad pinch arrives as ctrl+wheel)
      const r = gw.getBoundingClientRect();
      const mx = e.clientX - r.left, my = e.clientY - r.top;
      const k2 = Math.min(3, Math.max(0.2, view.k * Math.exp(-e.deltaY * 0.01)));
      view.x = mx - ((mx - view.x) / view.k) * k2;
      view.y = my - ((my - view.y) / view.k) * k2;
      view.k = k2;
    } else {
      view.x -= e.deltaX;
      view.y -= e.deltaY;
    }
    applyView();
  }, { passive: false });
  gw.addEventListener("dblclick", (e) => {
    if (!e.target.closest?.(".node")) { view.x = 0; view.y = 0; view.k = 1; applyView(); }
  });
  gw.addEventListener("auxclick", (e) => e.preventDefault());
}

// ---------------- resizable panels ----------------
{
  const root = document.documentElement;
  const savedW = localStorage.getItem("af.sidebarW");
  if (savedW) root.style.setProperty("--sidebar-w", savedW);
  const savedH = localStorage.getItem("af.logsH");
  if (savedH) root.style.setProperty("--logs-h", savedH);

  const dragSplit = (el, apply) => {
    el.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      el.setPointerCapture(e.pointerId);
      const move = (ev) => apply(ev);
      const up = () => {
        el.removeEventListener("pointermove", move);
        el.removeEventListener("pointerup", up);
      };
      el.addEventListener("pointermove", move);
      el.addEventListener("pointerup", up);
    });
  };
  dragSplit($("vsplit"), (e) => {
    const w = `${Math.min(600, Math.max(200, e.clientX))}px`;
    root.style.setProperty("--sidebar-w", w);
    localStorage.setItem("af.sidebarW", w);
  });
  dragSplit($("hsplit"), (e) => {
    const h = `${Math.min(innerHeight - 220, Math.max(120, innerHeight - 28 - e.clientY))}px`;
    root.style.setProperty("--logs-h", h);
    localStorage.setItem("af.logsH", h);
  });
}

// ---------------- logs ----------------
let logMode = "summary";
$("msum").onclick = () => { logMode = "summary"; syncModeBtns(); renderLog(); };
$("mfull").onclick = () => { logMode = "full"; syncModeBtns(); renderLog(); };
$("mcfg").onclick = () => { logMode = "config"; syncModeBtns(); renderLog(); };
function syncModeBtns() {
  $("msum").classList.toggle("on", logMode === "summary");
  $("mfull").classList.toggle("on", logMode === "full");
  $("mcfg").classList.toggle("on", logMode === "config");
}

function renderConfig(pane) {
  const node = cur.workflow.nodes.find((n) => n.id === selNode);
  if (!node) { pane.innerHTML = '<span class="sysline">unknown node</span>'; return; }
  const edges = cur.workflow.edges.filter((e) => e.from === node.id || e.to === node.id)
    .map((e) => `  ${e.from} ─${e.when ?? "ok"}→ ${e.to}${e.from === node.id ? "" : "  (incoming)"}`)
    .join("\n") || "  (none)";
  pane.innerHTML = [
    `<span class="sysline">── node config ──</span>`,
    `id:        ${esc(node.id)}`,
    `type:      ${node.type}`,
    node.label ? `label:     ${esc(node.label)}` : "",
    `maxVisits: ${node.maxVisits ?? 10} (per run)`,
    node.type === "agent" ? `resume:    ${node.resume !== false}` : "",
    ``,
    `<span class="sysline">── edges ──</span>`,
    esc(edges),
    ``,
    `<span class="sysline">── ${node.type === "shell" ? "command" : "prompt"} template ──</span>`,
    esc(node.run),
  ].filter((l) => l !== "").join("\n");
}

// finished transcripts are immutable; cache them
const transcripts = new Map(); // "node#visit" -> raw stream text

// live LLM stats parsed from the event stream while a node is running
const liveLlm = new Map(); // node id -> {model, turns, outputTokens, cacheRead, cacheWrite, contextTokens, contextPct}
function trackLiveLlm(node, chunk) {
  for (const line of chunk.split("\n")) {
    if (!line.startsWith("{")) continue;
    let ev;
    try { ev = JSON.parse(line); } catch { continue; }
    const cur = liveLlm.get(node) ?? {};
    if (ev.type === "system" && ev.subtype === "init") {
      cur.model = ev.model ?? cur.model;
      liveLlm.set(node, cur);
    } else if (ev.type === "assistant" && ev.message?.usage) {
      const u = ev.message.usage;
      cur.model ??= ev.message.model;
      cur.turns = (cur.turns ?? 0) + 1;
      cur.outputTokens = (cur.outputTokens ?? 0) + (u.output_tokens ?? 0);
      cur.cacheRead = (cur.cacheRead ?? 0) + (u.cache_read_input_tokens ?? 0);
      cur.cacheWrite = (cur.cacheWrite ?? 0) + (u.cache_creation_input_tokens ?? 0);
      cur.contextTokens = (u.input_tokens ?? 0) + (u.cache_read_input_tokens ?? 0) +
        (u.cache_creation_input_tokens ?? 0) + (u.output_tokens ?? 0);
      cur.contextPct = Math.round((cur.contextTokens / 200000) * 100);
      liveLlm.set(node, cur);
    }
  }
}

const short = (v, n) => { const s = typeof v === "string" ? v : JSON.stringify(v) ?? ""; return s.length > n ? s.slice(0, n) + "…" : s; };

// one stream-json line -> readable transcript line(s); non-JSON passes through
function renderEventLine(line) {
  if (!line.trim()) return "";
  let ev;
  try { ev = JSON.parse(line); } catch { return esc(line); }
  switch (ev.type) {
    case "system":
      return `<span class="sysline">· session ${ev.subtype ?? ""} ${ev.model ?? ""}</span>`;
    case "assistant": {
      const parts = [];
      for (const c of ev.message?.content ?? []) {
        if (c.type === "text" && c.text.trim()) parts.push(esc(c.text.trim()));
        if (c.type === "thinking" && c.thinking?.trim()) parts.push(`<span class="sysline">${esc(short(c.thinking.trim(), 400))}</span>`);
        if (c.type === "tool_use") parts.push(`<span class="tooluse">⚒ ${esc(c.name)} ${esc(short(c.input, 160))}</span>`);
      }
      return parts.join("\n");
    }
    case "user": {
      const parts = [];
      for (const c of ev.message?.content ?? []) {
        if (c.type === "tool_result") {
          const body = Array.isArray(c.content) ? c.content.map((x) => x.text ?? "").join(" ") : c.content ?? "";
          parts.push(`<span class="toolres">← ${esc(short(String(body).trim(), 220))}</span>`);
        }
      }
      return parts.join("\n");
    }
    case "result":
      return `<span class="sysline">── result (${ev.subtype ?? "?"}, ${ev.num_turns ?? "?"} turns) ──</span>`;
    default:
      return "";
  }
}

async function fullTextFor(r) {
  const key = `${r.node}#${r.visit}`;
  if (r.status === "running") return nodeLogs.get(r.node) ?? "";
  if (!transcripts.has(key)) {
    const resp = await fetch(`/api/task/${selId}/log/${r.node}/${r.visit}`);
    transcripts.set(key, resp.ok ? await resp.text() : (r.output ?? ""));
  }
  return transcripts.get(key);
}

async function renderLog() {
  $("lognode").textContent = selNode ?? "—";
  if (!selNode || !cur) return;
  const runs = (cur.runs ?? []).filter((r) => r.node === selNode);
  $("logmeta").textContent = runs.length
    ? `${runs.length} run${runs.length > 1 ? "s" : ""} · latest: ${runs.at(-1).status}`
    : "not run yet";
  const pane = $("logpane");
  if (logMode === "config") return renderConfig(pane);
  if (!runs.length) {
    pane.innerHTML = '<span class="sysline">no output yet</span>';
    return;
  }
  const sections = [];
  for (const r of runs) {
    const exit = r.exitCode !== undefined ? ` · exit ${r.exitCode}` : "";
    let head = `<span class="sysline">── visit ${r.visit} · ${r.status}${exit} ──</span>`;
    const live = r.status === "running" ? liveLlm.get(r.node) : null;
    if (r.llm || live) {
      const l = r.llm ?? live;
      const kt = (n) => n >= 1000 ? `${(n / 1000).toFixed(1)}k` : `${n ?? 0}`;
      const bits = [
        l.model,
        l.turns != null ? `${l.turns} turns` : null,
        l.outputTokens != null ? `out ${kt(l.outputTokens)}` : null,
        l.cacheRead != null ? `cache read ${kt(l.cacheRead)} / write ${kt(l.cacheWrite ?? 0)}` : null,
        l.contextPct != null ? `ctx ${kt(l.contextTokens)} (${l.contextPct}%)` : null,
        l.costUsd != null ? `$${l.costUsd.toFixed(4)}` : null,
        l.apiMs != null ? `${(l.apiMs / 1000).toFixed(0)}s api` : null,
      ].filter(Boolean).join(" · ");
      head += `\n<span class="tooluse">   ${esc(bits)}</span>`;
    }
    if (logMode === "summary") {
      if (r.status === "running") {
        // live stream is jsonl; show it parsed even in summary mode
        const body = (nodeLogs.get(r.node) ?? "").split("\n").map(renderEventLine).filter(Boolean).join("\n");
        sections.push(`${head}\n${body || '<span class="sysline">(waiting for output…)</span>'}`);
      } else {
        sections.push(`${head}\n${esc(r.output ?? "")}`);
      }
    } else {
      const raw = await fullTextFor(r);
      const body = raw.split("\n").map(renderEventLine).filter(Boolean).join("\n");
      const prompt = r.prompt
        ? `<span class="sysline">── prompt ──</span>\n<span class="prompt">${esc(r.prompt)}</span>\n<span class="sysline">── transcript ──</span>\n`
        : "";
      sections.push(`${head}\n${prompt}${body || '<span class="sysline">(empty transcript)</span>'}`);
    }
  }
  // follow the stream only when the user is already at the bottom; never
  // yank them back down while they're reading scrolled-up content
  const pinned = pane.scrollHeight - pane.scrollTop - pane.clientHeight < 60;
  pane.innerHTML = sections.join("\n\n");
  if (pinned) pane.scrollTop = pane.scrollHeight;
}

// ---------------- board wiring ----------------
async function interject(interrupt) {
  const input = $("fbinput");
  const message = input.value.trim();
  if (!message || !selId) return;
  await fetch(`/api/task/${selId}/interject`, {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({ message, interrupt }),
  });
  input.value = "";
}
$("fbsend").onclick = () => interject(false);
$("fbint").onclick = () => interject(true);
$("fbinput").addEventListener("keydown", (e) => { if (e.key === "Enter") interject(e.shiftKey); });

async function boot() {
  try {
    tasks = await (await fetch("/api/board")).json();
    renderList();
    if (tasks[0] && !selId) select(tasks[0].id);
  } catch (e) {
    console.error("board fetch failed", e);
  }
  const es = new EventSource("/api/board/events");
  es.onopen = () => setConn(true);
  es.onerror = () => setConn(false);
  es.addEventListener("board", (e) => {
    tasks = JSON.parse(e.data).sort((a, b) => b.createdAt.localeCompare(a.createdAt));
    renderList();
  });
}
boot();
</script>
